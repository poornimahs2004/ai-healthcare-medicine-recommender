{% extends "base.html" %} {% block content %}
<div class="max-w-6xl mx-auto min-h-[80vh] fade-in">
  <div class="glass-card p-6 mb-8 bg-white">
    <div class="flex items-center gap-4 mb-6">
      <div
        class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center text-green-600 shadow-sm"
      >
        <i data-lucide="utensils" class="w-7 h-7"></i>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-slate-800" data-i18n="diet_title">
          Smart Diet Planner
        </h2>
        <p class="text-slate-500 text-sm" data-i18n="diet_subtitle">
          Generate a personalized 7-day meal chart instantly.
        </p>
      </div>
    </div>

    <div class="grid md:grid-cols-4 gap-4">
      <div>
        <label
          class="text-xs font-bold text-slate-500 uppercase ml-1"
          data-i18n="lbl_goal"
          >Goal / Condition</label
        >
        <input
          id="d-goal"
          type="text"
          placeholder="e.g. Diabetes, Weight Loss"
          class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>
      <div>
        <label
          class="text-xs font-bold text-slate-500 uppercase ml-1"
          data-i18n="lbl_cuisine"
          >Cuisine</label
        >
        <select
          id="d-cuisine"
          class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-green-500 bg-white"
        >
          <option value="South Indian">South Indian</option>
          <option value="North Indian">North Indian</option>
          <option value="Continental">Continental</option>
          <option value="Mediterranean">Mediterranean</option>
        </select>
      </div>
      <div>
        <label
          class="text-xs font-bold text-slate-500 uppercase ml-1"
          data-i18n="lbl_pref"
          >Preference</label
        >
        <select
          id="d-type"
          class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-green-500 bg-white"
        >
          <option value="Vegetarian">Vegetarian</option>
          <option value="Non-Vegetarian">Non-Vegetarian</option>
          <option value="Vegan">Vegan</option>
          <option value="Eggetarian">Eggetarian</option>
        </select>
      </div>
      <div class="flex items-end">
        <button
          onclick="generateDiet()"
          id="btn-gen"
          class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition shadow-lg flex items-center justify-center gap-2"
        >
          <i data-lucide="sparkles" class="w-4 h-4"></i>
          <span data-i18n="btn_gen_plan">Generate Plan</span>
        </button>
      </div>
    </div>
  </div>

  <div
    id="diet-results"
    class="hidden grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
  ></div>

  <div id="diet-empty" class="text-center py-20 text-slate-400">
    <i data-lucide="chef-hat" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
    <p data-i18n="diet_empty">Select your preferences and click Generate.</p>
  </div>
</div>

<script>
  // Helper to get translation for JS-generated content
  function getTrans(key, fallback) {
    const lang = localStorage.getItem("careai_lang") || "en-US";
    if (
      typeof translations !== "undefined" &&
      translations[lang] &&
      translations[lang][key]
    ) {
      return translations[lang][key];
    }
    return fallback;
  }

  async function generateDiet() {
    const goal = document.getElementById("d-goal").value;
    if (!goal) return alert("Please enter a health goal (e.g. Diabetes).");

    const btn = document.getElementById("btn-gen");
    const originalHtml = btn.innerHTML;
    btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Cooking...`;
    btn.disabled = true;

    try {
      const res = await fetch("/generate_diet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          goal: goal,
          cuisine: document.getElementById("d-cuisine").value,
          type: document.getElementById("d-type").value,
          age: 30,
        }),
      });

      const data = await res.json();

      if (data.plan) {
        renderPlan(data.plan);
      } else {
        alert("Could not generate plan. Try again.");
      }
    } catch (e) {
      alert("Error connecting.");
      console.error(e);
    }

    btn.innerHTML = originalHtml;
    btn.disabled = false;
    lucide.createIcons();
  }

  function renderPlan(days) {
    const container = document.getElementById("diet-results");
    document.getElementById("diet-empty").classList.add("hidden");
    container.classList.remove("hidden");
    container.innerHTML = "";

    // Get translated labels
    const t_bf = getTrans("lbl_breakfast", "Breakfast");
    const t_ln = getTrans("lbl_lunch", "Lunch");
    const t_sn = getTrans("lbl_snack", "Snack");
    const t_dn = getTrans("lbl_dinner", "Dinner");

    days.forEach((day) => {
      const card = `
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition hover:-translate-y-1">
                <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-50">
                    <h3 class="font-bold text-green-700 text-lg">${day.day}</h3>
                    <span class="text-[10px] font-bold bg-green-50 text-green-600 px-2 py-1 rounded-full">${day.calories} kcal</span>
                </div>
                <div class="space-y-3">
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${t_bf}</span>
                        <p class="text-slate-700 text-sm font-medium">${day.breakfast}</p>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${t_ln}</span>
                        <p class="text-slate-700 text-sm font-medium">${day.lunch}</p>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${t_sn}</span>
                        <p class="text-slate-700 text-sm font-medium">${day.snack}</p>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${t_dn}</span>
                        <p class="text-slate-700 text-sm font-medium">${day.dinner}</p>
                    </div>
                </div>
            </div>`;
      container.innerHTML += card;
    });
  }

  lucide.createIcons();
  const lang = localStorage.getItem("careai_lang") || "en-US";
  if (typeof changeLanguage === "function") changeLanguage(lang);
</script>
{% endblock %}
