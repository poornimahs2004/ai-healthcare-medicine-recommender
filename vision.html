{% extends "base.html" %} {% block content %}
<div class="max-w-4xl mx-auto min-h-[80vh] fade-in">
  <div class="glass-card p-6 mb-8 bg-white flex items-center gap-4">
    <div
      class="w-14 h-14 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 shadow-sm"
    >
      <i data-lucide="scan-eye" class="w-7 h-7"></i>
    </div>
    <div>
      <h2 class="text-2xl font-bold text-slate-800" data-i18n="vision_title">
        Medical Vision
      </h2>
      <p class="text-slate-500 text-sm" data-i18n="vision_subtitle">
        Upload photos of skin issues, lab reports, or medicines for AI analysis.
      </p>
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-8">
    <div class="space-y-6">
      <div
        class="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center hover:bg-slate-50 transition cursor-pointer relative group"
        onclick="document.getElementById('img-upload').click()"
      >
        <input
          type="file"
          id="img-upload"
          accept="image/*"
          class="hidden"
          onchange="handleImageSelect()"
        />

        <div id="upload-placeholder">
          <div
            class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition"
          >
            <i data-lucide="upload-cloud" class="w-8 h-8"></i>
          </div>
          <h3 class="font-bold text-slate-700 mb-1">Click to Upload</h3>
          <p class="text-xs text-slate-400">JPG, PNG (Max 5MB)</p>
        </div>

        <img
          id="img-preview"
          class="hidden w-full h-64 object-contain rounded-xl shadow-sm mx-auto"
        />

        <button
          id="btn-clear"
          onclick="event.stopPropagation(); clearImage()"
          class="hidden absolute top-2 right-2 bg-red-100 text-red-500 p-2 rounded-full hover:bg-red-200"
        >
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="relative">
        <label class="text-xs font-bold text-slate-500 uppercase mb-1 block"
          >Additional Context (Optional)</label
        >
        <textarea
          id="vision-query"
          rows="2"
          class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
          placeholder="E.g., 'I have had this rash for 2 days' or 'Is this medicine safe?'"
        ></textarea>
      </div>

      <button
        onclick="analyzeImage()"
        id="btn-scan"
        class="w-full colorful-btn py-3 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2"
      >
        <i data-lucide="scan" class="w-5 h-5"></i>
        <span data-i18n="btn_scan">Scan Image</span>
      </button>
    </div>

    <div id="vision-result" class="hidden">
      <div
        class="glass-card p-6 bg-white h-full border-t-4 border-indigo-500 relative"
      >
        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
          <i data-lucide="file-search" class="text-indigo-600"></i> Analysis
          Report
        </h3>

        <div class="mb-6">
          <h4
            class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-2"
          >
            Medical Assessment
          </h4>
          <div
            id="res-medical"
            class="pro-text text-sm text-slate-600 bg-blue-50 p-4 rounded-xl border border-blue-100"
          ></div>
        </div>

        <div>
          <h4
            class="text-xs font-bold text-green-600 uppercase tracking-wider mb-2"
          >
            Natural Remedies
          </h4>
          <div
            id="res-herbal"
            class="pro-text text-sm text-slate-600 bg-green-50 p-4 rounded-xl border border-green-100"
          ></div>
        </div>

        <div class="absolute top-4 right-4">
          <button
            onclick="playVisionAudio()"
            class="p-2 rounded-full bg-slate-100 hover:bg-indigo-100 text-slate-500 hover:text-indigo-600 transition"
          >
            <i data-lucide="volume-2" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </div>

    <div
      id="vision-empty"
      class="flex flex-col items-center justify-center text-slate-300 h-full min-h-[300px] border-2 border-dashed border-slate-100 rounded-2xl"
    >
      <i data-lucide="image" class="w-16 h-16 mb-4 opacity-50"></i>
      <p>Result will appear here</p>
    </div>
  </div>
</div>

<script>
  let currentBase64 = null;
  let lastResultText = "";

  // --- IMAGE HANDLING ---
  function handleImageSelect() {
    const file = document.getElementById("img-upload").files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        currentBase64 = e.target.result;
        document.getElementById("img-preview").src = currentBase64;
        document.getElementById("img-preview").classList.remove("hidden");
        document.getElementById("upload-placeholder").classList.add("hidden");
        document.getElementById("btn-clear").classList.remove("hidden");
      };
      reader.readAsDataURL(file);
    }
  }

  function clearImage() {
    currentBase64 = null;
    document.getElementById("img-upload").value = "";
    document.getElementById("img-preview").classList.add("hidden");
    document.getElementById("upload-placeholder").classList.remove("hidden");
    document.getElementById("btn-clear").classList.add("hidden");
    document.getElementById("vision-result").classList.add("hidden");
    document.getElementById("vision-empty").classList.remove("hidden");
  }

  // --- API CALL ---
  async function analyzeImage() {
    if (!currentBase64) return alert("Please upload an image first.");

    const btn = document.getElementById("btn-scan");
    const query =
      document.getElementById("vision-query").value ||
      "Analyze this medical image in detail.";
    const lang = localStorage.getItem("careai_lang") || "en-US";

    // Loading State
    const originalBtn = btn.innerHTML;
    btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Scanning...`;
    btn.disabled = true;

    try {
      // Reuse the existing /chat endpoint which handles images perfectly
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          query: query,
          image: currentBase64,
          language: lang,
        }),
      });

      const data = await res.json();

      // Render Results
      document.getElementById("vision-empty").classList.add("hidden");
      document.getElementById("vision-result").classList.remove("hidden");

      document.getElementById("res-medical").innerHTML = formatResponseText(
        data.medical
      );
      document.getElementById("res-herbal").innerHTML = formatResponseText(
        data.herbal
      );

      lastResultText = data.medical + ". " + data.herbal;
      lucide.createIcons();
    } catch (e) {
      alert("Analysis failed. Please try again.");
      console.error(e);
    }

    btn.innerHTML = originalBtn;
    btn.disabled = false;
    lucide.createIcons();
  }

  // --- UTILS ---
  function formatResponseText(text) {
    if (!text) return "No info.";
    let clean = text.replace(/•/g, "\n\n• ").replace(/: /g, ":\n");
    return typeof marked !== "undefined" ? marked.parse(clean) : text;
  }

  function playVisionAudio() {
    if (!lastResultText) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(lastPlanText.replace(/[*#]/g, "")); // Bug fix: use lastResultText
    u.text = lastResultText.replace(/[*#]/g, "");
    u.lang =
      localStorage.getItem("careai_lang") === "Hindi" ? "hi-IN" : "en-US"; // Simple map
    window.speechSynthesis.speak(u);
  }

  lucide.createIcons();

  // Trigger Translation
  const lang = localStorage.getItem("careai_lang") || "en-US";
  if (typeof changeLanguage === "function") changeLanguage(lang);
</script>

<style>
  /* --- PRO TEXT FORMATTING --- */
  .pro-text {
    font-size: 0.9rem;
    line-height: 1.6;
    color: #334155;

    /* CRITICAL FIXES FOR OVERFLOW */
    white-space: pre-wrap; /* Preserves AI's newlines but wraps long text */
    word-wrap: break-word; /* Forces long words/sentences to break */
    overflow-wrap: break-word; /* Modern standard for wrapping */
    max-width: 100%; /* Ensures it never exceeds the container */
  }

  /* Bullet Point Styling */
  .pro-text ul {
    list-style-type: disc !important;
    padding-left: 1.25rem !important;
    margin-top: 0.5rem !important;
  }

  .pro-text li {
    margin-bottom: 0.5rem !important;
    display: list-item !important;
  }

  /* Bold Text Highlight (Blue) */
  .pro-text strong {
    font-weight: 700;
    color: #1e40af;
    background-color: #dbeafe;
    padding: 1px 4px;
    border-radius: 4px;
  }
</style>
{% endblock %}
