<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Care AI - Health Suite</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
      }

      html {
        scroll-behavior: smooth;
      }

      .hidden {
        display: none !important;
      }

      /* UI Components */
      .colorful-btn {
        background: linear-gradient(135deg, #2563eb, #3b82f6, #059669);
        color: white;
        transition: all 0.2s;
      }

      .colorful-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      .glass-card {
        background: white;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        border-radius: 1rem;
      }

      .chat-bubble {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .user-bubble {
        background-color: #eff6ff;
        color: #1e40af;
        border-bottom-right-radius: 2px;
        margin-left: auto;
      }

      .ai-bubble {
        background-color: #ffffff;
        color: #334155;
        border-bottom-left-radius: 2px;
        margin-right: auto;
        border: 1px solid #e2e8f0;
      }

      .ai-bubble strong {
        font-weight: 700;
        color: #0f172a;
      }

      iframe {
        width: 100%;
        height: 450px;
        border: none;
        border-radius: 0.75rem;
        background-color: #e2e8f0;
      }

      .nav-active {
        background-color: #eff6ff;
        color: #2563eb;
        font-weight: 700;
        border: 1px solid #bfdbfe !important;
      }

      .fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .mic-active {
        animation: pulse-red 1.5s infinite;
        color: #ef4444 !important;
        background-color: #fee2e2 !important;
      }

      @keyframes pulse-red {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      /* VOICE CONTROLS FLOAT */
      #voice-controls {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        padding: 10px;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border: 1px solid #e2e8f0;
        display: flex;
        gap: 10px;
        align-items: center;
        z-index: 1000;
        transform: translateY(100px);
        transition: transform 0.3s ease;
      }

      #voice-controls.show {
        transform: translateY(0);
      }
    </style>
  </head>

  <body class="text-slate-800 antialiased">
    <div
      id="page-welcome"
      class="flex flex-col items-center justify-center min-h-screen p-6 text-center bg-white"
    >
      <div
        class="w-24 h-24 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-full flex items-center justify-center mb-8 text-white shadow-2xl animate-bounce"
      >
        <i data-lucide="heart-pulse" class="w-12 h-12"></i>
      </div>

    <div

    <div id="voice-controls" class="hidden">
      <button
        onclick="pauseVoice()"

      >
        <i data-lucide="pause" class="w-5 h-5"></i>
      </button>
      <button
        onclick="resumeVoice()"
        class="p-3 rounded-full bg-gray-100 hover:bg-gray-200 text-slate-600"
      >
        <i data-lucide="play" class="w-5 h-5"></i>
      </button>
      <button
        onclick="stopVoice()"
        class="p-3 rounded-full bg-red-100 hover:bg-red-200 text-red-600"
      >
        <i data-lucide="square" class="w-5 h-5"></i>
      </button>
    </div>

    <script>
      const SYMPTOMS = [
        "fever",
        "cough",
        "headache",
        "sore_throat",
        "runny_nose",
        "sneezing",
        "body_ache",
        "fatigue",
        "chills",
        "nausea",
        "vomiting",
        "diarrhea",
        "shortness_of_breath",
        "congestion",
        "watery_eyes",
        "itchy_eyes",
        "joint_pain",
        "muscle_pain",
        "abdominal_pain",
        "chest_pain",
        "dizziness",
        "migraine",
        "rash",
        "back_pain",
        "neck_pain",
        "insomnia",
        "anxiety",
        "dry_skin",
        "sweating",
        "weakness",
      ];

      let selected = [],
        currentUserId = sessionStorage.getItem("token"),
        userLat = null,
        userLon = null,
        lastPlanText = "";

      window.speechSynthesis.getVoices();

      // --- VOICE LOGIC ---
      function toggleVoice(inputId, btnId) {
        if (!("webkitSpeechRecognition" in window))
          return alert("Use Chrome for voice.");
        const recognition = new webkitSpeechRecognition();
        const btn = document.getElementById(btnId);
        recognition.lang = document.getElementById("lang-select").value;
        recognition.start();
        recognition.onstart = () => {
          btn.classList.add("mic-active");
          document.getElementById(inputId).placeholder = "Listening...";
        };
        recognition.onend = () => {
          btn.classList.remove("mic-active");
          document.getElementById(inputId).placeholder = "Type or speak...";
        };
        recognition.onresult = (e) => {
          const txt = e.results[0][0].transcript;
          document.getElementById(inputId).value = txt;
          if (inputId === "cp-search") filterS(txt);
          if (inputId === "c-in") sendChat();
        };
      }

      function speakText(text) {
        window.speechSynthesis.cancel();
        const cleanText = text.replace(/[*#_`]/g, "").replace(/\[.*?\]/g, "");
        const u = new SpeechSynthesisUtterance(cleanText);
        u.lang = document.getElementById("lang-select").value;

        // Show Controls
        document.getElementById("voice-controls").classList.remove("hidden");
        document.getElementById("voice-controls").classList.add("show");

        u.onend = () => {
          document.getElementById("voice-controls").classList.remove("show");
          setTimeout(
            () =>
              document.getElementById("voice-controls").classList.add("hidden"),
            300
          );
        };

        window.speechSynthesis.speak(u);
      }

      function pauseVoice() {
        window.speechSynthesis.pause();
      }

      function resumeVoice() {
        window.speechSynthesis.resume();
      }

      function stopVoice() {
        window.speechSynthesis.cancel();
      }

      function speakResult() {
        speakText(lastPlanText || "No plan available.");
      }

      // --- APP LOGIC ---
      function switchTab(id) {
        document
          .querySelectorAll(".view-tab")
          .forEach((e) => e.classList.add("hidden"));
        document.getElementById("tab-" + id).classList.remove("hidden");
        document
          .querySelectorAll(".nav-item")
          .forEach((b) => b.classList.remove("nav-active"));
        if (document.getElementById("btn-" + id))
          document.getElementById("btn-" + id).classList.add("nav-active");
      }

      function showPage(p) {
        ["welcome", "login", "register", "app"].forEach((i) =>
          document.getElementById(`page-${i}`).classList.add("hidden")
        );
        document.getElementById(`page-${p}`).classList.remove("hidden");
        if (p === "app") {
          lucide.createIcons();
          loadHistory();
          filterS("");
          switchTab("plan");
        }
      }

      function logout() {
        sessionStorage.removeItem("token");
        currentUserId = null;
        showPage("welcome");
      }

      async function auth(type) {
        const e = document.getElementById(
            type === "login" ? "l-email" : "r-email"
          ).value,
          p = document.getElementById(
            type === "login" ? "l-pass" : "r-pass"
          ).value,
          ph =
            type === "register"
              ? document.getElementById("r-phone").value
              : null,
          msg = document.getElementById(type === "login" ? "l-msg" : "r-msg");

        try {
          const res = await fetch(`/auth/${type}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: e,
              password: p,
              phone: ph,
            }),
          });
          const d = await res.json();
          if (res.ok) {
            if (type === "login") {
              sessionStorage.setItem("token", d.user_id);
              currentUserId = d.user_id;
              showPage("app");
            } else {
              msg.innerText = "Success! Login now.";
              msg.classList.remove("hidden", "text-red-500");
              msg.classList.add("text-green-600");
            }
          } else {
            msg.innerText = d.error;
            msg.classList.remove("hidden");
          }
        } catch (err) {
          alert("Connection Error");
        }
      }

      function getMyLocation() {
        if (!navigator.geolocation) return alert("No GPS");
        const btn = document.querySelector('button[onclick="getMyLocation()"]');
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Locating...`;
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;
            document.getElementById("d-loc").value = `${userLat.toFixed(
              5
            )}, ${userLon.toFixed(5)}`;
            btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> GPS Active`;
            btn.className =
              "bg-green-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 shadow-md transition";
            lucide.createIcons();
            findDocs();
          },
          () => {
            alert("GPS Denied");
            btn.innerText = "Use GPS";
          },
          {
            enableHighAccuracy: true,
          }
        );
      }

      async function findDocs() {
        const spec = document.getElementById("d-spec").value || "Hospital",
          loc = document.getElementById("d-loc").value || "Nearby";
        let mapQuery = `${spec} near ${loc}`;
        if (userLat && userLon && loc.includes(userLat.toFixed(5))) {
          mapQuery = `${spec} near ${userLat},${userLon}`;
          loc = `${userLat},${userLon}`;
        }
        document.getElementById(
          "gmap-frame"
        ).src = `https://maps.google.com/maps?q=${encodeURIComponent(
          mapQuery
        )}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
        const list = document.getElementById("d-list");
        list.innerHTML =
          '<p class="text-slate-400 p-2 animate-pulse">Scanning...</p>';
        const pl = {
          specialty: spec,
          location: loc,
        };
        if (userLat && userLon) {
          pl.lat = userLat;
          pl.lon = userLon;
        }
        try {
          const res = await fetch("/doctors", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(pl),
          });
          const d = await res.json();
          list.innerHTML = "";
          if (d.result && d.result.length > 0) {
            d.result.forEach((doc) => {
              list.innerHTML += `<div onclick="focusMap('${doc.name}','${
                doc.address
              }')" class="bg-slate-50 p-4 rounded-xl border border-slate-100 hover:shadow-md transition hover:bg-white group cursor-pointer hover:border-blue-400"><div class="flex justify-between items-start mb-2"><h4 class="font-bold text-slate-800 group-hover:text-blue-600 transition">${
                doc.name
              }</h4><span class="bg-white text-green-700 border border-green-200 text-xs font-bold px-2 py-1 rounded-md">⭐ ${
                doc.rating || "N/A"
              }</span></div><p class="text-xs text-slate-500 truncate"><i data-lucide="map-pin" class="w-3 h-3 inline"></i> ${
                doc.address
              }</p></div>`;
            });
            lucide.createIcons();
          } else {
            list.innerHTML =
              '<p class="text-slate-400 text-center text-sm">No details found. Map works above.</p>';
          }
        } catch (e) {
          list.innerHTML = '<p class="text-red-400 text-sm">Error.</p>';
        }
      }

      function focusMap(n, a) {
        document.getElementById(
          "gmap-frame"
        ).src = `https://maps.google.com/maps?q=${encodeURIComponent(
          n + " " + a
        )}&t=&z=17&ie=UTF8&iwloc=&output=embed`;
      }

      function filterS(q) {
        const b = document.getElementById("s-box");
        b.innerHTML = "";
        SYMPTOMS.filter((s) => s.includes(q.toLowerCase())).forEach((s) => {
          const d = document.createElement("div");
          d.className = `p-3 rounded-lg cursor-pointer transition border font-medium text-sm flex items-center gap-2 ${
            selected.includes(s)
              ? "bg-blue-500 text-white border-blue-500 shadow-md"
              : "bg-white text-slate-600 hover:bg-slate-50 border-slate-200"
          }`;
          d.innerHTML = selected.includes(s)
            ? `<i data-lucide="check" class="w-3 h-3"></i> ${s.replace(
                /_/g,
                " "
              )}`
            : s.replace(/_/g, " ");
          d.onclick = () => {
            if (selected.includes(s))
              selected = selected.filter((x) => x !== s);
            else selected.push(s);
            filterS(document.getElementById("cp-search").value);
          };
          b.appendChild(d);
        });
        lucide.createIcons();
      }

      // --- UPDATED GET PLAN FUNCTION ---
      async function getPlan() {
        const age = document.getElementById("cp-age").value || 30,
          lang = document.getElementById("lang-select").value;
        if (!selected.length) return alert("Select symptoms!");
        const btn = document.querySelector('button[onclick="getPlan()"]');
        const old = btn.innerHTML;
        btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Analyzing...`;
        btn.disabled = true;

        // --- NEW: GATHER VITALS ---
        const vitals = {
          temperature: document.getElementById("v-temp").value,
          systolic_bp: document.getElementById("v-sys").value,
          heart_rate: document.getElementById("v-hr").value,
          spo2: document.getElementById("v-spo2").value,
        };

        try {
          const res = await fetch("/recommend", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              symptoms: selected,
              age,
              user_id: currentUserId,
              language: lang,
              vitals: vitals, // Sending Vitals
            }),
          });
          const d = await res.json();

          document.getElementById("r-disease").innerText = d.disease;

          // Handle Emergency Styling
          const resBox = document.getElementById("res-box");
          if (d.is_emergency) {
            resBox.classList.remove("border-blue-500");
            resBox.classList.add("border-red-500");
            document.getElementById("r-disease").classList.add("text-red-600");
          } else {
            resBox.classList.remove("border-red-500");
            resBox.classList.add("border-blue-500");
            document
              .getElementById("r-disease")
              .classList.remove("text-red-600");
          }

          const contentText = `Medicine: ${d.medicine}\nDiet: ${d.diet}\nPrecautions: ${d.precautions}`;
          lastPlanText = `Condition: ${d.disease}. ${d.description}. ${contentText}`;
          document.getElementById(
            "r-content"
          ).innerHTML = `<p class="text-slate-600 mb-6 text-lg leading-relaxed">${d.description}</p><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-blue-50 p-5 rounded-2xl"><strong class="text-blue-700 block mb-1">Medicine</strong> ${d.medicine}</div><div class="bg-green-50 p-5 rounded-2xl"><strong class="text-green-700 block mb-1">Diet</strong> ${d.diet}</div><div class="bg-amber-50 p-5 rounded-2xl"><strong class="text-amber-700 block mb-1">Lifestyle</strong> ${d.workouts}</div><div class="bg-red-50 p-5 rounded-2xl"><strong class="text-red-700 block mb-1">Precautions</strong> ${d.precautions}</div></div>`;
          resBox.classList.remove("hidden");
          resBox.scrollIntoView({
            behavior: "smooth",
          });
          speakResult();
          loadHistory();
        } catch (e) {
          alert("Error");
        }
        btn.innerHTML = old;
        btn.disabled = false;
        lucide.createIcons();
      }

      async function downloadReport() {
        const payload = {
          disease: document.getElementById("r-disease").innerText,
          description: lastPlanText,
          medicine: "See PDF",
          diet: "",
          workouts: "",
          precautions: "",
        };
        try {
          const res = await fetch("/download_report", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });
          if (res.ok) {
            const b = await res.blob(),
              u = window.URL.createObjectURL(b),
              a = document.createElement("a");
            a.href = u;
            a.download = "Report.pdf";
            document.body.appendChild(a);
            a.click();
            a.remove();
          }
        } catch (e) {}
      }

      async function sendChat() {
        const inp = document.getElementById("c-in"),
          txt = inp.value,
          lang = document.getElementById("lang-select").value;
        if (!txt) return;
        const box = document.getElementById("chat-box");
        box.innerHTML += `<div class="flex justify-end fade-in"><div class="chat-bubble user-bubble shadow">${txt}</div></div>`;
        inp.value = "";
        box.scrollTop = box.scrollHeight;
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            query: txt,
            language: lang,
          }),
        });
        const d = await res.json();
        const ttsBtn = `<button onclick="speakText('${d.response.replace(
          /'/g,
          "\\'"
        )}')" class="ml-2 text-gray-400 hover:text-blue-600"><i data-lucide="volume-2" class="w-4 h-4"></i></button>`;
        const clean = marked.parse(d.response);
        box.innerHTML += `<div class="flex justify-start fade-in items-start"><div class="chat-bubble ai-bubble shadow">${clean}</div>${ttsBtn}</div>`;
        box.scrollTop = box.scrollHeight;
        lucide.createIcons();
        speakText(d.response);
      }

      async function loadHistory() {
        const list = document.getElementById("hist-list");
        try {
          const res = await fetch(`/history?user_id=${currentUserId}`);
          const d = await res.json();
          list.innerHTML = "";
          d.forEach((i) => {
            list.innerHTML += `<div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm mb-2"><h4 class="font-bold text-blue-900">${i.disease}</h4><span class="text-xs text-slate-400">${i.date}</span><p class="text-sm text-slate-600 line-clamp-2">${i.description}</p></div>`;
          });
        } catch (e) {}
      }

      document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();
        if (currentUserId) showPage("app");
        document.getElementById("c-in").addEventListener("keypress", (e) => {
          if (e.key === "Enter") sendChat();
        });
        document.getElementById("d-loc").addEventListener("keypress", (e) => {
          if (e.key === "Enter") findDocs();
        });
      });
    </script>
  </body>
</html>
